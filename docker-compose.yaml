services:
  pg:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - ./out/pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pg-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migration:/migrations
